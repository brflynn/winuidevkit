name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Build all language packs ────────────────────────────────────────────
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Build Python wheel
        working-directory: src/python
        run: |
          pip install build
          python -m build --wheel

      # ── Package each language zip ──────────────────────────────────────
      - name: Package all language zips
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $out = "release"
          New-Item -ItemType Directory -Path $out -Force

          # --- Helper: stage shared files into a language staging dir ---
          function Stage-Shared($dir) {
            Copy-Item scripts/winuidev.ps1 $dir
            # .cmd wrapper for winuidev
            "@echo off`r`npowershell.exe -NoProfile -ExecutionPolicy Bypass -File `"%~dp0winuidev.ps1`" %*" |
              Set-Content (Join-Path $dir "winuidev.cmd") -Encoding ASCII
            # SDK installer
            $sdk = Join-Path $dir "sdk"
            New-Item -ItemType Directory -Path $sdk -Force | Out-Null
            Copy-Item src/core/sdk/Install-WinAppSdk.ps1 $sdk
            # XAML templates
            Copy-Item src/core/xaml-templates $dir/xaml-templates -Recurse
            Copy-Item src/core/manifests      $dir/manifests -Recurse
          }

          # ── Python ──────────────────────────────────────────────────
          $s = "staging/python"; New-Item -ItemType Directory $s -Force | Out-Null
          Copy-Item src/python/dist/*.whl $s/
          Stage-Shared $s
          Copy-Item examples/python-helloworld $s/template -Recurse
          Compress-Archive "$s/*" "$out/winuidevkit-python.zip"

          # ── Rust ────────────────────────────────────────────────────
          $s = "staging/rust"; New-Item -ItemType Directory $s -Force | Out-Null
          Copy-Item src/rust/Cargo.toml $s/
          Copy-Item src/rust/src $s/src -Recurse
          Copy-Item src/rust/README.md $s/
          Stage-Shared $s
          Copy-Item examples/rust-helloworld $s/template -Recurse
          Compress-Archive "$s/*" "$out/winuidevkit-rust.zip"

          # ── Go ──────────────────────────────────────────────────────
          $s = "staging/go"; New-Item -ItemType Directory $s -Force | Out-Null
          Copy-Item src/go/go.mod $s/
          Copy-Item src/go/bootstrap $s/bootstrap -Recurse
          Copy-Item src/go/winrt     $s/winrt -Recurse
          Copy-Item src/go/README.md $s/
          Stage-Shared $s
          Copy-Item examples/go-helloworld $s/template -Recurse
          Compress-Archive "$s/*" "$out/winuidevkit-go.zip"

          # ── Node.js ────────────────────────────────────────────────
          $s = "staging/nodejs"; New-Item -ItemType Directory $s -Force | Out-Null
          Copy-Item src/nodejs/package.json $s/
          Copy-Item src/nodejs/tsconfig.json $s/
          Copy-Item src/nodejs/src $s/src -Recurse
          Copy-Item src/nodejs/CMakeLists.txt $s/
          Copy-Item src/nodejs/README.md $s/
          Stage-Shared $s
          Copy-Item examples/nodejs-helloworld $s/template -Recurse
          Compress-Archive "$s/*" "$out/winuidevkit-nodejs.zip"

          # ── Swift ──────────────────────────────────────────────────
          $s = "staging/swift"; New-Item -ItemType Directory $s -Force | Out-Null
          Copy-Item src/swift/Package.swift $s/
          Copy-Item src/swift/Sources $s/Sources -Recurse
          Copy-Item src/swift/README.md $s/
          Stage-Shared $s
          Copy-Item examples/swift-helloworld $s/template -Recurse
          Compress-Archive "$s/*" "$out/winuidevkit-swift.zip"

          # ── install.ps1 ────────────────────────────────────────────
          Copy-Item scripts/install.ps1 $out/

          Get-ChildItem $out | ForEach-Object { Write-Host "$($_.Name) ($([math]::Round($_.Length/1KB)) KB)" }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/winuidevkit-python.zip
            release/winuidevkit-rust.zip
            release/winuidevkit-go.zip
            release/winuidevkit-nodejs.zip
            release/winuidevkit-swift.zip
            release/install.ps1
          generate_release_notes: true
          body: |
            ## Install

            **One-liner (interactive — picks your language):**
            ```powershell
            irm https://github.com/brflynn/WinUIDevKit/releases/latest/download/install.ps1 | iex
            ```

            **Or specify directly:**
            ```powershell
            irm https://github.com/brflynn/WinUIDevKit/releases/latest/download/install.ps1 -OutFile install.ps1
            .\install.ps1 -Language python
            ```

            Then:
            ```
            winuidev setup
            winuidev init MyApp
            cd MyApp
            winuidev run
            ```
